<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Station</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <!-- JS at top with defer -->
    <script src="nav.js" defer></script>
    <script src="clock.js" defer></script>
    <script src="timer.js" defer></script>
    <script src="stopwatch.js" defer></script>
    <script src="alarm.js" defer></script>
</head>

<body>
    <div class="app-container">
        <!-- NAVBAR -->
        <div class="navbar">
            <button class="tab-btn active" data-tab="clock">Current Time</button>
            <button class="tab-btn" data-tab="alarm">Alarm</button>
            <button class="tab-btn" data-tab="timer">Timer</button>
            <button class="tab-btn" data-tab="stopwatch">Stopwatch</button>
        </div>

        <!-- TAB CONTENT -->
        <div id="clock" class="section active">
            <div class="timezone-selector">
                <label for="timezone">Timezone:</label>
                <select id="timezone">
                    <option value="Local">Local</option>
                    <option value="America/New_York">New York</option>
                    <option value="Europe/London">London</option>
                    <option value="Asia/Karachi" selected>Karachi</option>
                    <option value="Asia/Tokyo">Tokyo</option>
                </select>
            </div>
            <div class="clock">
                <div class="DateBox">
                    <p class="day"></p>
                    <p class="dates"></p>
                </div>
                <div class="time">
                    <p class="cycle">AM</p>
                    <p class="hrs"></p>
                    <p class="dots">:</p>
                    <p class="mins"></p>
                    <p class="dots">:</p>
                    <p class="sec"></p>
                </div>
            </div>
        </div>

        <div id="alarm" class="section">
            <div class="alarm">
                <input type="time" id="alarm-time">
                <button id="set-alarm">Set Alarm</button>
                <p class="alarm-status">No alarm set</p>
            </div>
        </div>

        <div id="timer" class="section">
            <div class="timer">
                <div class="timer-display">00:00:00</div>
                <button id="start-timer">Start</button>
                <button id="pause-timer">Pause</button>
                <button id="reset-timer">Reset</button>
            </div>
        </div>

        <div id="stopwatch" class="section">
            <div class="stopwatch">
                <div class="stopwatch-display">00:00:00</div>
                <button id="start-stopwatch">Start</button>
                <button id="pause-stopwatch">Pause</button>
                <button id="reset-stopwatch">Reset</button>
            </div>
        </div>
    </div>
    <footer class="footer">
    <p>Developed by <span class="highlight">Codify<\></span> © 2025</p>
</footer>
</body>

</html>
