<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Classifier</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161b25;
      --border:    #2a3040;
      --accent:    #4f8ef7;
      --accent2:   #7c5cfc;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --cat:       #f97316;
      --dog:       #22c55e;
      --fox:       #ef4444;
      --radius:    16px;
      --shadow:    0 8px 32px rgba(0,0,0,.55);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 40px; }

    .header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px;
      width: 100%;
      max-width: 560px;
    }

    /* ── Drop zone ───────────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .25s, background .25s;
      position: relative;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(79,142,247,.07);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 3rem; margin-bottom: 14px; display: block; }

    .drop-zone p { color: var(--muted); font-size: .9rem; line-height: 1.6; }
    .drop-zone strong { color: var(--accent); }

    /* ── Preview ─────────────────────────────────────────────────────────── */
    #preview-wrap {
      margin-top: 24px;
      display: none;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #preview-wrap img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      background: #0a0c10;
      display: block;
    }

    /* ── Button ──────────────────────────────────────────────────────────── */
    #predict-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .4px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: none;
    }

    #predict-btn:hover { opacity: .88; }
    #predict-btn:active { transform: scale(.98); }
    #predict-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result card ─────────────────────────────────────────────────────── */
    #result {
      margin-top: 28px;
      display: none;
      animation: fadeUp .35s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0);    }
    }

    .result-label {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .prediction-big {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: capitalize;
      margin-bottom: 4px;
    }

    .confidence-line {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Score bars ──────────────────────────────────────────────────────── */
    .scores { display: flex; flex-direction: column; gap: 10px; }

    .score-row { display: flex; flex-direction: column; gap: 4px; }

    .score-header {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .bar-bg {
      height: 10px;
      background: rgba(255,255,255,.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .6s cubic-bezier(.22,1,.36,1);
    }

    .bar-cat  { background: var(--cat); }
    .bar-dog  { background: var(--dog); }
    .bar-fox  { background: var(--fox); }
    .bar-default { background: var(--accent); }

    /* ── Error ───────────────────────────────────────────────────────────── */
    .error-msg {
      color: var(--fox);
      font-size: .88rem;
      margin-top: 14px;
      padding: 12px 16px;
      background: rgba(239,68,68,.1);
      border-radius: 8px;
      border: 1px solid rgba(239,68,68,.25);
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🐾 Animal Classifier</h1>
    <p>Upload a photo — the AI will identify whether it's a <b>Cat</b>, <b>Dog</b>, or <b>Fox</b>.</p>
  </div>

  <div class="card">

    <!-- Drop zone -->
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <span class="drop-icon">📷</span>
      <p>
        <strong>Click to upload</strong> or drag &amp; drop<br>
        JPG, PNG, WEBP, BMP — any size
      </p>
    </div>

    <!-- Image preview -->
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Preview" />
    </div>

    <!-- Predict button -->
    <button id="predict-btn">Analyse Image</button>

    <!-- Error -->
    <div class="error-msg" id="error-msg"></div>

    <!-- Result -->
    <div id="result">
      <div class="result-label">Prediction</div>
      <div class="prediction-big" id="pred-class"></div>
      <div class="confidence-line" id="pred-conf"></div>
      <div class="scores" id="score-bars"></div>
    </div>

  </div>

  <script>
    const dropZone   = document.getElementById("drop-zone");
    const fileInput  = document.getElementById("file-input");
    const previewWrap= document.getElementById("preview-wrap");
    const previewImg = document.getElementById("preview-img");
    const predictBtn = document.getElementById("predict-btn");
    const resultDiv  = document.getElementById("result");
    const predClass  = document.getElementById("pred-class");
    const predConf   = document.getElementById("pred-conf");
    const scoreBars  = document.getElementById("score-bars");
    const errorMsg   = document.getElementById("error-msg");

    const CLASS_COLORS = { cat: "cat", dog: "dog", fox: "fox" };

    let selectedFile = null;

    // ── Drag & drop ──────────────────────────────────────────────────────────
    dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const f = e.dataTransfer.files[0];
      if (f) handleFile(f);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(f) {
      selectedFile = f;
      const url = URL.createObjectURL(f);
      previewImg.src = url;
      previewWrap.style.display = "block";
      predictBtn.style.display  = "block";
      resultDiv.style.display   = "none";
      errorMsg.style.display    = "none";
    }

    // ── Predict ───────────────────────────────────────────────────────────────
    predictBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      predictBtn.disabled = true;
      predictBtn.innerHTML = '<span class="spinner"></span>Analysing…';
      resultDiv.style.display  = "none";
      errorMsg.style.display   = "none";

      const form = new FormData();
      form.append("file", selectedFile);

      try {
        const resp = await fetch("/predict", { method: "POST", body: form });
        const data = await resp.json();

        if (!resp.ok || data.error) {
          showError(data.error || `Server error ${resp.status}`);
          return;
        }

        showResult(data);
      } catch (err) {
        showError("Network error — make sure app.py is running.");
      } finally {
        predictBtn.disabled = false;
        predictBtn.innerHTML = "Analyse Image";
      }
    });

    // ── Display result ────────────────────────────────────────────────────────
    function showResult(data) {
      const cls   = data.prediction;
      const conf  = data.confidence;
      const scores= data.scores;

      const colorVar = `var(--${CLASS_COLORS[cls] || "accent"})`;

      predClass.textContent = cls;
      predClass.style.color = colorVar;
      predConf.textContent  = `Confidence: ${conf}%`;

      // Build score bars
      scoreBars.innerHTML = "";
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      for (const [name, pct] of sorted) {
        const colorClass = `bar-${CLASS_COLORS[name] || "default"}`;
        scoreBars.innerHTML += `
          <div class="score-row">
            <div class="score-header">
              <span>${name}</span>
              <span>${pct}%</span>
            </div>
            <div class="bar-bg">
              <div class="bar-fill ${colorClass}" style="width:0%"
                   data-target="${pct}"></div>
            </div>
          </div>`;
      }

      resultDiv.style.display = "block";

      // Animate bars after paint
      requestAnimationFrame(() => requestAnimationFrame(() => {
        resultDiv.querySelectorAll(".bar-fill").forEach(el => {
          el.style.width = el.dataset.target + "%";
        });
      }));
    }

    function showError(msg) {
      errorMsg.textContent   = "⚠ " + msg;
      errorMsg.style.display = "block";
    }
  </script>
</body>
</html>
